version: '3.8'

networks:
  sgime_network:
    driver: bridge

volumes:
  sgime_postgres_data:
  sgime_redmine_files:
  sgime_redmine_plugins:

services:
  postgres:
    image: postgres:16
    container_name: sgime-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sgime_production}
      POSTGRES_USER: ${POSTGRES_USER:-sgime_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sgime_senha_segura_2025!}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    volumes:
      - sgime_postgres_data:/var/lib/postgresql/data
    networks:
      - sgime_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sgime_user} -d ${POSTGRES_DB:-sgime_production}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redmine:
    image: redmine:5.1
    container_name: sgime-redmine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      REDMINE_DB_POSTGRES: postgres
      REDMINE_DB_USERNAME: ${POSTGRES_USER:-sgime_user}
      REDMINE_DB_PASSWORD: ${POSTGRES_PASSWORD:-sgime_senha_segura_2025!}
      REDMINE_DB_DATABASE: ${POSTGRES_DB:-sgime_production}
      REDMINE_DB_PORT: 5432
      REDMINE_SECRET_KEY_BASE: ${REDMINE_SECRET_KEY_BASE:-d9c3ddf1283e52e7a54ecef10e83feca68bd080745ebf26cacddafe292850c2c15d3aef2b93c6ad8c17499ab69631a8016e8fc1a16102746593c91509b022b83}
      REDMINE_PLUGINS_MIGRATE: 1
    volumes:
      - sgime_redmine_files:/usr/src/redmine/files
      - sgime_redmine_plugins:/usr/src/redmine/plugins
      - ./plugins:/usr/src/redmine/plugins_local
    networks:
      - sgime_network
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.25-alpine
    container_name: sgime-nginx
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./config/nginx/sites:/etc/nginx/conf.d
    networks:
      - sgime_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
