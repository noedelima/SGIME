data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Fundo azul institucional -->
  <rect width="32" height="32" fill="#003366"/>
  
  <!-- Globo central dourado -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#DAA520" stroke-width="1.5"/>
  
  <!-- Linhas do globo -->
  <path d="M16 6 L16 26 M6 16 L26 16 M8 12 Q16 8 24 12 M8 20 Q16 24 24 20" 
        fill="none" stroke="#DAA520" stroke-width="0.8"/>
  
  <!-- Texto CPII -->
  <text x="16" y="12" font-family="Arial" font-size="6" font-weight="bold" 
        text-anchor="middle" fill="#DAA520">COLÉGIO</text>
  <text x="16" y="18" font-family="Arial" font-size="5" font-weight="bold" 
        text-anchor="middle" fill="#DAA520">PEDRO</text>
  <text x="16" y="23" font-family="Arial" font-size="6" font-weight="bold" 
        text-anchor="middle" fill="#DAA520">II</text>
  
  <!-- Ramos laterais simplificados -->
  <path d="M4 28 Q6 26 8 28 M24 28 Q26 26 28 28" 
