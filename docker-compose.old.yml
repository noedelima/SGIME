# Docker Compose para SGIME - Plugin Volume Strategy
# Sistema de Gestão Integrada de Engenharia
# Colégio Pedro II - Seção de Engenharia
# Versão: 1.7 - Plugin Volumes

version: '3.8'

networks:
  sgime_network:
    driver: bridge

volumes:
  sgime_postgres_data:
  sgime_redmine_files:

services:
  # ===== BANCO DE DADOS POSTGRESQL =====
  postgres:
    image: postgres:16
    container_name: sgime-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redmine}
      POSTGRES_USER: ${POSTGRES_USER:-redmine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-redmine_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    volumes:
      - sgime_postgres_data:/var/lib/postgresql/data
    networks:
      - sgime_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redmine} -d ${POSTGRES_DB:-redmine}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===== REDMINE APPLICATION =====
  redmine:
    image: redmine:5.1
    container_name: sgime-redmine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      REDMINE_DB_POSTGRES: postgres
      REDMINE_DB_USERNAME: ${POSTGRES_USER:-redmine}
      REDMINE_DB_PASSWORD: ${POSTGRES_PASSWORD:-redmine_password}
      REDMINE_DB_DATABASE: ${POSTGRES_DB:-redmine}
      REDMINE_DB_PORT: 5432
      REDMINE_SECRET_KEY_BASE: ${REDMINE_SECRET_KEY_BASE:-your-secret-key-base-here-change-this-in-production}
      REDMINE_PLUGINS_MIGRATE: 1
    volumes:
      - sgime_redmine_files:/usr/src/redmine/files
      # Plugin volumes - can be mounted/unmounted dynamically
      # Uncomment lines below to enable specific plugins:
      # - ./plugins/sgime_customizations:/usr/src/redmine/plugins/sgime_customizations
      # - ./plugins/redmine_checklists:/usr/src/redmine/plugins/redmine_checklists
      # - ./plugins/redmine_dashboard:/usr/src/redmine/plugins/redmine_dashboard
      # - ./plugins/redmine_dmsf:/usr/src/redmine/plugins/redmine_dmsf
    networks:
      - sgime_network
    ports:
      - "${REDMINE_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===== NGINX PROXY =====
  nginx:
    image: nginx:1.25-alpine
    container_name: sgime-nginx
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./config/nginx/sites:/etc/nginx/conf.d
    networks:
      - sgime_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_DOMAIN: ${SMTP_DOMAIN}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO}
      # Configurações SGIME
      SGIME_VERSION: ${SGIME_VERSION}
      SGIME_CONTACT_EMAIL: ${SGIME_CONTACT_EMAIL}
      ORGANIZATION_NAME: ${ORGANIZATION_NAME}
      DEPARTMENT_NAME: ${DEPARTMENT_NAME}
    volumes:
      - redmine_files:/usr/src/redmine/files
      - redmine_plugins:/usr/src/redmine/plugins
      - redmine_themes:/usr/src/redmine/public/themes
      - ./config/redmine:/usr/src/redmine/config/additional_config
      - ./logs/redmine:/usr/src/redmine/log
    networks:
      - sgime_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== NGINX REVERSE PROXY =====
  nginx:
    image: nginx:1.25-alpine
    container_name: sgime_nginx
    restart: unless-stopped
    depends_on:
      - redmine
    ports:
      - "${NGINX_PORT}:80"
      - "${NGINX_SSL_PORT}:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/ssl/certs:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - sgime_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== REDIS PARA CACHE (OPCIONAL) =====
  redis:
    image: redis:7-alpine
    container_name: sgime_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - sgime_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===== BACKUP AUTOMÁTICO =====
  backup:
    build:
      context: .
      dockerfile: docker/backup/Dockerfile
    container_name: sgime_backup
    restart: unless-stopped
    depends_on:
      - postgres
      - redmine
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS}
      TZ: ${TZ}
    volumes:
      - ./backups:/backups
      - redmine_files:/redmine_files:ro
    networks:
      - sgime_network

# ===== VOLUMES PERSISTENTES =====
volumes:
  postgres_data:
    driver: local
  redmine_files:
    driver: local
  redmine_plugins:
    driver: local
  redmine_themes:
    driver: local
  redis_data:
    driver: local

# ===== REDE INTERNA =====
networks:
  sgime_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
