# SGIME Plugin Configuration
# Configuração dos plugins essenciais e opcionais
# Este arquivo é usado pelos scripts de automação

# =============================================================================
# PLUGINS ESSENCIAIS - Habilitados por padrão na instalação
# =============================================================================

# Dashboard personalizado para Redmine
PLUGIN_redmine_dashboard_REPO="https://github.com/jgraichen/redmine_dashboard.git"
PLUGIN_redmine_dashboard_ENABLED=true
PLUGIN_redmine_dashboard_DESCRIPTION="Dashboard personalizado para visão geral do sistema"

# Sistema de tarefas recorrentes (INCOMPATÍVEL)
PLUGIN_redmine_recurring_tasks_REPO="https://github.com/nutso/redmine-plugin-recurring-tasks.git"
PLUGIN_redmine_recurring_tasks_ENABLED=false
PLUGIN_redmine_recurring_tasks_DESCRIPTION="Automação de tarefas recorrentes e manutenção"
PLUGIN_redmine_recurring_tasks_REQUIRES_TABLES=true
PLUGIN_redmine_recurring_tasks_NOTES="INCOMPATÍVEL COM REDMINE 6.0 - problemas de LoadError"

# Sistema de checklists simples (BACKUP)
PLUGIN_simple_checklists_REPO="https://github.com/ggilder/redmine_simple_checklists.git"
PLUGIN_simple_checklists_ENABLED=false
PLUGIN_simple_checklists_DESCRIPTION="Sistema de checklists básico (backup - substituído por redmine_checklists)"
PLUGIN_simple_checklists_NOTES="Mantido como backup em caso de problemas com redmine_checklists Light"

# Templates de issues
PLUGIN_redmine_issue_templates_REPO="https://github.com/akiko-pusu/redmine_issue_templates.git"
PLUGIN_redmine_issue_templates_ENABLED=true
PLUGIN_redmine_issue_templates_DESCRIPTION="Templates padronizados para criação de issues"

# =============================================================================
# PLUGINS OPCIONAIS - Baixados mas não habilitados por padrão
# =============================================================================

# Gestão de documentos (problemas de compatibilidade)
PLUGIN_redmine_dmsf_REPO="https://github.com/danmunn/redmine_dmsf.git"
PLUGIN_redmine_dmsf_ENABLED=false
PLUGIN_redmine_dmsf_DESCRIPTION="Sistema de gestão de documentos e arquivos"
PLUGIN_redmine_dmsf_NOTES="Desabilitado devido a conflitos de dependências nativas no Redmine 6.0"

# Checklists oficiais RedmineUP (ATIVO - Light version)
PLUGIN_redmine_checklists_REPO="manual_install"
PLUGIN_redmine_checklists_ENABLED=true
PLUGIN_redmine_checklists_DESCRIPTION="Sistema de checklists oficial RedmineUP (versão Light gratuita)"
PLUGIN_redmine_checklists_NOTES="Download manual - plugin comercial com versão Light gratuita"

# Metodologias ágeis (plugin comercial)
PLUGIN_redmine_agile_REPO="https://github.com/RedmineUP/redmine_agile.git"
PLUGIN_redmine_agile_ENABLED=false
PLUGIN_redmine_agile_DESCRIPTION="Ferramentas para metodologias ágeis (Scrum, Kanban)"
PLUGIN_redmine_agile_NOTES="Plugin comercial, requer licença para uso completo"

# =============================================================================
# CONFIGURAÇÕES GLOBAIS
# =============================================================================

# Versão mínima do Redmine suportada
REDMINE_MIN_VERSION="5.0.0"

# Versão recomendada do Redmine
REDMINE_RECOMMENDED_VERSION="6.0.6"

# Plugins que requerem criação manual de tabelas
PLUGINS_REQUIRING_MANUAL_TABLES="redmine_recurring_tasks"

# Plugins com problemas de compatibilidade conhecidos
PROBLEMATIC_PLUGINS="redmine_dmsf"

# Data da última verificação de compatibilidade
LAST_COMPATIBILITY_CHECK="2025-07-25"
