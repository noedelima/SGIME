# Configuração Simplificada do Nginx para SGIME
# Sistema de Gestão Integrada de Engenharia

# Upstream para o Redmine
upstream redmine_backend {
    server redmine:3000 fail_timeout=0;
    keepalive 32;
}

# Servidor principal HTTP
server {
    listen 80;
    server_name localhost sgime.cp2.g12.br _;
    
    # Configurações básicas
    client_max_body_size 100M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "SGIME Nginx OK\n";
        add_header Content-Type text/plain;
    }
    
    # Endpoint interno de health check
    location /nginx-health {
        access_log off;
        return 200 "SGIME Nginx Internal OK\n";
        add_header Content-Type text/plain;
    }
    
    # Proxy para o Redmine
    location / {
        proxy_pass http://redmine_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

        # Assets estáticos do plugin SGIME (servidos diretamente)
        location /sgime_customizations/ {
            alias /usr/src/redmine/plugins/sgime_customizations/assets/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            try_files $uri $uri/ =404;
        }
    
    # Servir arquivos estáticos diretamente (se disponíveis)
    location ~* ^/(stylesheets|images|javascripts|plugin_assets|themes)/ {
        # Tentar servir arquivo estático, senão proxy para Redmine
        try_files $uri @redmine;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Fallback para arquivos estáticos
    location @redmine {
        proxy_pass http://redmine_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
