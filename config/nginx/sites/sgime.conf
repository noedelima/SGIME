# Configuração do Site SGIME
# Sistema de Gestão Integrada de Engenharia
# Colégio Pedro II - Seção de Engenharia
# Licença: GPLv3

# Upstream para o Redmine
upstream redmine_backend {
    server redmine:3000 fail_timeout=0;
    keepalive 32;
}

# Redirecionamento HTTP para HTTPS
server {
    listen 80;
    server_name sgime.cp2.g12.br localhost;
    
    # Endpoint de health check
    location /health {
        access_log off;
        return 200 "SGIME Nginx OK\n";
        add_header Content-Type text/plain;
    }
    
    # Redirecionar para HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Configuração HTTPS Principal
server {
    listen 443 ssl http2;
    server_name sgime.cp2.g12.br localhost;

    # Configurações SSL
    ssl_certificate /etc/nginx/ssl/sgime.crt;
    ssl_certificate_key /etc/nginx/ssl/sgime.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Headers de segurança
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; media-src 'self'; object-src 'none'; child-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Configurações específicas do SGIME
    client_max_body_size 100M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Logs específicos do SGIME
    access_log /var/log/nginx/sgime_access.log sgime_format;
    error_log /var/log/nginx/sgime_error.log;

    # Servir arquivos estáticos do Redmine
    location ~* ^/(stylesheets|images|javascripts|plugin_assets|themes)/ {
        root /var/www/redmine/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        
        # Fallback para o backend se arquivo não existir
        try_files $uri @redmine;
    }

    # Servir arquivos de upload
    location /attachments/ {
        internal;
        root /var/www/redmine/files;
        expires 1h;
        add_header Cache-Control "private";
    }

    # Rota para arquivos grandes (uploads)
    location /upload {
        client_max_body_size 1G;
        client_body_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_pass http://redmine_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Health check interno
    location /nginx-health {
        access_log off;
        return 200 "SGIME Nginx SSL OK\n";
        add_header Content-Type text/plain;
    }

    # Localização principal - proxy para Redmine
    location / {
        proxy_pass http://redmine_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer para melhor performance
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Named location para fallback
    location @redmine {
        proxy_pass http://redmine_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Bloquear acesso a arquivos sensíveis
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(git|svn)/ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
