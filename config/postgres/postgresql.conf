# Configuração PostgreSQL para SGIME
# Sistema de Gestão Integrada de Engenharia
# Colégio Pedro II - Seção de Engenharia
# Otimizada para PostgreSQL 16
# Licença: GPLv3

# =============================================================================
# CONFIGURAÇÕES DE CONEXÃO E AUTENTICAÇÃO
# =============================================================================

# Porta de escuta (padrão Docker)
port = 5432

# Número máximo de conexões simultâneas
max_connections = 200

# Configuração de autenticação
authentication_timeout = 1min
password_encryption = scram-sha-256

# =============================================================================
# CONFIGURAÇÕES DE MEMÓRIA
# =============================================================================

# Buffer compartilhado (25% da RAM disponível para o container)
shared_buffers = 256MB

# Cache efetivo (aproximadamente 75% da RAM total do sistema)
effective_cache_size = 1GB

# Memória de trabalho para operações de ordenação/hash
work_mem = 4MB

# Memória para operações de manutenção
maintenance_work_mem = 64MB

# =============================================================================
# CONFIGURAÇÕES DE ESCRITA (WAL)
# =============================================================================

# Configuração do WAL (Write-Ahead Logging)
wal_buffers = 16MB
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# Checkpoint - quando escrever dados para disco
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min

# =============================================================================
# CONFIGURAÇÕES DE CONSULTA E PERFORMANCE
# =============================================================================

# Estatísticas para otimização de consultas
default_statistics_target = 100

# Custo de páginas aleatórias (SSD = 1.1, HDD = 4.0)
random_page_cost = 1.1

# Custo sequencial de página
seq_page_cost = 1.0

# Concorrência de E/S efetiva (para SSD)
effective_io_concurrency = 200

# =============================================================================
# CONFIGURAÇÕES DE LOG
# =============================================================================

# Nível de log
log_min_messages = warning
log_min_error_statement = error

# Log de consultas lentas (ajustar conforme necessário)
log_min_duration_statement = 1000

# Formato do log
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# Destino dos logs
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_rotation_age = 1d
log_rotation_size = 100MB

# =============================================================================
# CONFIGURAÇÕES DE REPLICAÇÃO (para futuro)
# =============================================================================

# Configurações para replicação (desabilitadas por padrão)
#hot_standby = on
#max_wal_senders = 3
#wal_keep_size = 256MB

# =============================================================================
# CONFIGURAÇÕES ESPECÍFICAS PARA REDMINE/SGIME
# =============================================================================

# Locale brasileiro
lc_messages = 'pt_BR.UTF-8'
lc_monetary = 'pt_BR.UTF-8'  
lc_numeric = 'pt_BR.UTF-8'
lc_time = 'pt_BR.UTF-8'

# Timezone
timezone = 'America/Sao_Paulo'

# Configurações de texto
default_text_search_config = 'pg_catalog.portuguese'

# =============================================================================
# CONFIGURAÇÕES DE EXTENSÕES
# =============================================================================

# Extensões padrão para SGIME
shared_preload_libraries = 'pg_stat_statements'

# =============================================================================
# CONFIGURAÇÕES DE SEGURANÇA
# =============================================================================

# Configurações SSL (se habilitado)
#ssl = on
#ssl_cert_file = 'server.crt'
#ssl_key_file = 'server.key'
#ssl_ca_file = 'ca.crt'

# Timeout de sessão inativa
tcp_keepalives_idle = 600
tcp_keepalives_interval = 30
tcp_keepalives_count = 3

# =============================================================================
# CONFIGURAÇÕES DE MANUTENÇÃO AUTOMÁTICA
# =============================================================================

# Autovacuum - limpeza automática
autovacuum = on
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.1
autovacuum_vacuum_cost_delay = 20ms
autovacuum_vacuum_cost_limit = 200

# =============================================================================
# CONFIGURAÇÕES ESPECÍFICAS PARA CONTAINER
# =============================================================================

# Configurações específicas para ambiente Docker
listen_addresses = '*'
unix_socket_directories = '/var/run/postgresql'
data_directory = '/var/lib/postgresql/data'
hba_file = '/var/lib/postgresql/data/pg_hba.conf'
ident_file = '/var/lib/postgresql/data/pg_ident.conf'

# =============================================================================
# CONFIGURAÇÕES EXPERIMENTAIS (POSTGRESQL 16)
# =============================================================================

